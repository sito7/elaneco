<nav class="navbar">
  <div class="logo" style="display: flex; align-items: center; gap: 10px;">
    <img src="/assets/images/logo.jpeg" alt="ÉLAN ÉCO Logo" style="height: 40px;">
    <span>ÉLAN ÉCO</span>
  </div>
  
  <button class="hamburger-btn" (click)="toggleMenu()" aria-label="Toggle menu">
    <svg *ngIf="!menuOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="3" y1="12" x2="21" y2="12"></line>
      <line x1="3" y1="6" x2="21" y2="6"></line>
      <line x1="3" y1="18" x2="21" y2="18"></line>
    </svg>
    <svg *ngIf="menuOpen" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"></line>
      <line x1="6" y1="6" x2="18" y2="18"></line>
    </svg>
  </button>

  <ul class="nav-links" [class.mobile-open]="menuOpen">
    <li><a style="cursor: pointer;" [class.active]="nav.activeSection() === 'inicio'" (click)="nav.setActive('inicio'); closeMenu()">Inicio</a></li>
    <li><a style="cursor: pointer;" [class.active]="nav.activeSection() === 'marca'" (click)="nav.setActive('marca'); closeMenu()">Sobre la marca</a></li>
    <li><a style="cursor: pointer;" [class.active]="nav.activeSection() === 'producto'" (click)="nav.setActive('producto'); closeMenu()">Producto</a></li>
    <li><a style="cursor: pointer;" [class.active]="nav.activeSection() === 'promociones'" (click)="nav.setActive('promociones'); closeMenu()">Eventos</a></li>
    <li><a style="cursor: pointer;" [class.active]="nav.activeSection() === 'distribuidores'" (click)="nav.setActive('distribuidores'); closeMenu()">Distribución y contacto</a></li>
  </ul>
</nav>
